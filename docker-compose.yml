# Projeto Docker SEPARADO para o site institucional AtaraxIA.
# Princípio: NÃO toca o projeto `root` (n8n SAGRADO). Junta-se à rede do Traefik existente.
# Deploy: docker compose -p ataraxia-site up -d   (NUNCA o botão "Implantar" do painel)
#
# ⚠️ Antes de subir, confirmar o nome real da rede do Traefik na VPS:
#     docker network ls
# Se NÃO for `root_default`, ajustar as 2 ocorrências abaixo (label traefik.docker.network + networks.name).

services:
  site:
    image: nginx:alpine
    container_name: ataraxia-site
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx-conf/:/etc/nginx/conf.d/:ro   # diretório (não arquivo único) — git pull reflete no container
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.ataraxiasite.rule=Host(`ataraxiasistemas.com.br`) || Host(`www.ataraxiasistemas.com.br`)"
      - "traefik.http.routers.ataraxiasite.entrypoints=websecure"
      - "traefik.http.routers.ataraxiasite.tls.certresolver=mytlschallenge"
      - "traefik.http.services.ataraxiasite.loadbalancer.server.port=80"
      # redirect www -> apex (opcional, cosmético de SEO)
      - "traefik.http.routers.ataraxiasite.middlewares=ataraxia-wwwredirect"
      - "traefik.http.middlewares.ataraxia-wwwredirect.redirectregex.regex=^https://www\\.ataraxiasistemas\\.com\\.br/(.*)"
      - "traefik.http.middlewares.ataraxia-wwwredirect.redirectregex.replacement=https://ataraxiasistemas.com.br/$${1}"
      - "traefik.http.middlewares.ataraxia-wwwredirect.redirectregex.permanent=true"

networks:
  web:
    external: true
    name: root_default
