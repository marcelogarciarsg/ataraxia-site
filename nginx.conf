# nginx do site estático AtaraxIA (servido atrás do Traefik).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # páginas reais (index.html, politica-privacidade.html) resolvem direto;
    # caminho desconhecido cai numa 404 limpa.
    location / {
        try_files $uri $uri/ =404;
    }

    # compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # cache leve de estáticos
    location ~* \.(?:css|js|svg|png|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # segurança básica de headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
