# nginx do site estático AtaraxIA (servido atrás do Traefik).
# Montado como DIRETÓRIO (./nginx-conf/ -> /etc/nginx/conf.d/) para que git pull
# reflita mudanças no container (bind-mount de arquivo único prende o inode antigo — moby#6011).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # segurança básica (nível server — herdado SÓ em locations sem add_header próprio)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Assets estáticos: regex casa ANTES do location /. Sem build/hash -> NÃO usar immutable.
    # add_header local anula a herança (ngx_http_headers_module): repetir os 3 de segurança.
    location ~* \.(?:css|js|mjs|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # HTML e tudo mais: sempre revalida (ETag -> 304). "/" resolve index.html aqui.
    # add_header local anula a herança: repetir os 3 de segurança.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
